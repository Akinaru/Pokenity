<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokenity BO - Configurations</title>
    <link rel="stylesheet" href="/admin/assets/admin.css" />
    <script defer src="/admin/assets/common.js"></script>
    <script defer src="/admin/assets/configurations.js"></script>
  </head>
  <body data-page="configurations">
    <div class="bo-layout">
      <aside class="bo-sidebar">
        <h2 class="bo-brand">Pokenity BO</h2>
        <p class="bo-subtitle">Administration API</p>
        <nav class="bo-nav">
          <a class="bo-nav-link" data-page="dashboard" href="/admin/">Dashboard</a>
          <a class="bo-nav-link" data-page="users" href="/admin/users.html">Users</a>
          <a class="bo-nav-link" data-page="boxes" href="/admin/boxes.html">Boxes</a>
          <a class="bo-nav-link" data-page="characters" href="/admin/characters.html">Characters</a>
          <a class="bo-nav-link" data-page="trades" href="/admin/trades.html">Trades</a>
          <a class="bo-nav-link" data-page="openings" href="/admin/box-openings.html">Openings</a>
          <a class="bo-nav-link" data-page="configurations" href="/admin/configurations.html">Configurations</a>
        </nav>
      </aside>

      <main class="bo-main">
        <header class="bo-top">
          <div>
            <h1>Configurations</h1>
            <p>Paramètres globaux de l'API utilisés par les tirages et calculs.</p>
          </div>
          <div class="bo-top-actions">
            <span class="bo-badge" id="configurationsBadge">0 configs</span>
            <button class="bo-btn soft" id="refreshConfigurationsBtn" type="button">Rafraichir</button>
          </div>
        </header>

        <section class="bo-panel">
          <div class="bo-panel-head">
            <h2>Paramètres administrables</h2>
            <span class="bo-counter" id="configurationsCount">0</span>
          </div>
          <div class="bo-panel-content">
            <p class="bo-help">
              Le taux shiny est utilisé à chaque ouverture de box côté serveur.
            </p>
          </div>
          <div class="bo-table-wrap" id="configurationsTableWrap"></div>
        </section>
      </main>
    </div>
  </body>
</html>
