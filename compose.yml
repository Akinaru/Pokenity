services:
  db:
    image: mariadb:10.4
    container_name: db_docker_pokenity
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/db:/var/db
      - ./docker/db/my.cnf:/etc/mysql/conf.d/my.cnf
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    networks:
      - dev
    ports:
      - "3309:3306"
  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin_docker_pokenity
    depends_on:
      - db
    ports:
      - 81:80
    environment:
      PMA_HOST: db
      UPLOAD_LIMIT: 100M
    networks:
      - dev


networks:
  dev:

volumes:
  db-data:
